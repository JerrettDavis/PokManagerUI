name: Question
description: Ask a question about the project
labels: ["question"]
body:
  - type: markdown
    attributes:
      value: |
        Have a question about PokManagerApi? Please fill out the form below.

        **Note:** For general discussions, please use [GitHub Discussions](../../discussions) instead.

  - type: textarea
    id: question
    attributes:
      label: Question
      description: What would you like to know?
      placeholder: |
        How do I...
        What is the best way to...
        Can you explain...
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Context
      description: Provide any additional context that might help us answer your question
      placeholder: |
        I'm trying to...
        My setup includes...
        I've already tried...
    validations:
      required: false
